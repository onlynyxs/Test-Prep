<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEB Grade 12 Math – 10 Predicted Sets (New Curriculum)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap');
        :root { --neb-navy: #0f1b2d; --neb-blue: #1a365d; --neb-gold: #c8960c; }
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; color: #1e293b; margin: 0; line-height: 1.6; }
        .paper-font { font-family: 'Lora', serif; }
        .sidebar-link { transition: all 0.2s ease; border-left: 3px solid transparent; cursor: pointer; font-size: 0.875rem; font-weight: 500; }
        .sidebar-link:hover { background-color: #1e293b; color: #e2e8f0; }
        .sidebar-link.active { background-color: #1a365d; color: #ffffff; border-left: 3px solid #eab308; font-weight: 700; }
        .sidebar-link.set-link { padding-left: 3rem; font-size: 0.8rem; }
        .question-row { display: flex; margin-bottom: 0.8rem; align-items: flex-start; gap: 0.5rem; }
        .q-no { width: 28px; font-weight: 700; flex-shrink: 0; text-align: right; }
        .q-text { flex-grow: 1; text-align: justify; font-size: 0.95rem; }
        .q-marks { width: 40px; text-align: right; font-weight: 600; font-size: 0.8rem; color: #64748b; }
        .group-header { border-bottom: 2px solid #1e293b; border-top: 2px solid #1e293b; margin: 2rem 0 1rem; padding: 0.5rem 0; text-align: center; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; }
        .or-divider { text-align: center; font-style: italic; font-weight: 600; margin: 1rem 0; color: #64748b; font-size: 0.85rem; }
        .answer-box { background: #fffbeb; border: 1px solid #fcd34d; border-left: 4px solid #f59e0b; padding: 0.8rem; margin: 0.5rem 0; border-radius: 4px; font-size: 0.85rem; }
        @media print { .no-print { display: none !important; } .print-area { width: 100% !important; padding: 0; margin: 0; } .page-break { page-break-before: always; } }
    </style>
</head>
<body class="flex flex-col md:flex-row min-h-screen">

    <nav class="w-full md:w-64 lg:w-72 bg-slate-900 text-slate-300 flex flex-col no-print border-r border-slate-800">
        <div class="p-6 border-b border-slate-800">
            <h1 class="text-xl font-bold text-white">∑ NEB MATH 12</h1>
            <p class="text-[10px] text-slate-500 uppercase tracking-widest mt-1">Syllabus 2079-2083</p>
        </div>
        <div class="flex-grow overflow-y-auto py-4">
            <button onclick="renderView('analysis')" id="nav-analysis" class="sidebar-link w-full text-left px-6 py-3 flex items-center gap-2 active">📊 Analysis</button>
            <button onclick="renderView('answerkey')" id="nav-answerkey" class="sidebar-link w-full text-left px-6 py-3 flex items-center gap-2">🔑 Answer Keys</button>
            <div class="text-[10px] font-bold text-slate-500 px-6 mt-4 mb-2 uppercase">Mock Sets</div>
            <div id="set-links"></div>
        </div>
        <div class="p-4 bg-slate-950 border-t border-slate-800">
            <button onclick="window.print()" class="bg-blue-600 hover:bg-blue-500 text-white text-xs font-bold py-2.5 rounded w-full">🖨️ PRINT SET</button>
        </div>
    </nav>

    <main class="flex-grow overflow-y-auto bg-white p-6 md:p-12">
        <div id="content-area" class="max-w-3xl mx-auto print-area"></div>
    </main>

    <script>
        const mcqPool = [
            { q: "How many ways can 6 books be arranged on a shelf?", ans: "720" },
            { q: "Coefficient of \\(x^4\\) in \\((1+x)^8\\) is:", ans: "70" },
            { q: "If \\(\\omega\\) is a cube root of unity, then \\(1+\\omega+\\omega^2 =\\)", ans: "0" },
            { q: "The modulus of \\(3-4i\\) is:", ans: "5" },
            { q: "In Simplex method, the feasible region is always:", ans: "Convex" },
            { q: "Slope of the tangent to \\(y=x^2\\) at \\(x=2\\) is:", ans: "4" },
            { q: "Approximate value of \\(\\sqrt{17}\\) using differentials is:", ans: "4.125" },
            { q: "If \\(P(A)=0.4, P(B)=0.5\\) (Independent), then \\(P(A\\cap B)=\\)", ans: "0.2" },
            { q: "Order of the differential equation \\(y'' + 3y' + 2y = 0\\) is:", ans: "2" },
            { q: "Value of \\(\\hat{i}\\cdot(\\hat{j}\\times\\hat{k})\\) is:", ans: "1" },
            { q: "Focus of the parabola \\(y^2=12x\\) is:", ans: "(3,0)" },
            { q: "Number of terms in \\((1+x)^{20}\\) is:", ans: "21" },
            { q: "If \\(A\\) is symmetric, then \\(A^T=\\)", ans: "\\(A\\)" },
            { q: "Range of correlation coefficient is:", ans: "[-1, 1]" }
        ];

        const saqPool = [
            { q: "Solve by Cramer's rule: \\(x+y+z=6, x-y+z=2, 2x+y-z=1\\).", ans: "\\(x=1, y=2, z=3\\)", marks: 5 },
            { q: "Find the approximate value of \\(\\sqrt{37}\\) using differentials.", ans: "6.0833", marks: 5 },
            { q: "Find the tangent and normal to \\(y=x^2\\) at \\((3,9)\\).", ans: "T: \\(y=6x-9\\); N: \\(x+6y=57\\)", marks: 5 },
            { q: "Prove by Induction: \\(1^2+2^2+...+n^2 = \\frac{n(n+1)(2n+1)}{6}\\).", ans: "Proof Required", marks: 5 },
            { q: "Find the area bounded by \\(y=x^2\\) and \\(y=x\\).", ans: "1/6 sq. units", marks: 5 },
            { q: "Solve: \\(\\frac{dy}{dx} + \\frac{y}{x} = x^2\\).", ans: "\\(y = \\frac{x^3}{4} + \\frac{c}{x}\\)", marks: 5 },
            { q: "Expand \\((1-x)^{-1/2}\\) up to the 4th term.", ans: "\\(1 + \\frac{1}{2}x + \\frac{3}{8}x^2 + \\frac{5}{16}x^3\\)", marks: 5 },
            { q: "Find the correlation coefficient for \\(X: 1,2,3\\) and \\(Y: 2,4,6\\).", ans: "1.0", marks: 5 },
            { q: "Evaluate \\(\\int_0^1 \\frac{1}{1+x^2} dx\\).", ans: "\\(\\pi/4\\)", marks: 5 }
        ];

        const laqPool = [
            { q: "Solve by Simplex Method: Maximize \\(Z=3x+2y\\) subject to \\(x+y\\le 4, 2x+y\\le 5, x,y\\ge 0\\).", ans: "Max Z=9 at (1,3)", marks: 8 },
            { q: "Derive standard equation of Ellipse \\(\\frac{x^2}{a^2}+\\frac{y^2}{b^2}=1\\).", ans: "Derivation", marks: 8 },
            { q: "State and prove De Moivre's Theorem for integer index.", ans: "Proof", marks: 8 },
            { q: "Using differentials, approximate \\(\\sqrt[3]{65}\\).", ans: "4.0208", marks: 8 },
            { q: "Evaluate \\(\\int_0^{\\pi} \\frac{x \\sin x}{1 + \\cos^2 x} dx\\).", ans: "\\(\\pi^2/4\\)", marks: 8 }
        ];

        const setCache = {};
        function generateSets() {
            for (let s = 1; s <= 10; s++) {
                setCache[s] = {
                    num: s,
                    groupA: [...mcqPool].sort(() => Math.random() - 0.5).slice(0, 11),
                    groupB: [...saqPool].sort(() => Math.random() - 0.5).slice(0, 8),
                    groupC: [...laqPool].sort(() => Math.random() - 0.5).slice(0, 3)
                };
            }
        }

        function renderView(viewId) {
            document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
            if (document.getElementById('nav-' + viewId)) document.getElementById('nav-' + viewId).classList.add('active');

            const content = document.getElementById('content-area');
            if (viewId === 'analysis') {
                content.innerHTML = `<h2 class="text-2xl font-bold mb-4">Curriculum Analysis</h2><p>Focus: Binomial (Rational), Simplex, and Differential Approx.</p>`;
            } else if (viewId === 'answerkey') {
                let html = `<h2 class="text-2xl font-bold mb-6">Answer Keys</h2>`;
                for (let i = 1; i <= 10; i++) {
                    html += `<h3 class="font-bold border-b mt-4">Set ${i}</h3>`;
                    setCache[i].groupA.forEach((q, idx) => html += `<div class="answer-box">Q${idx+1}: ${q.ans}</div>`);
                }
                content.innerHTML = html;
            } else {
                const setNum = viewId.replace('set', '');
                renderSet(setNum);
            }
            if (window.MathJax) MathJax.typeset();
        }

        function renderSet(n) {
            const data = setCache[n];
            let html = `<div class="paper-font text-center mb-8">
                <h2 class="text-xl font-bold uppercase">National Examination Board</h2>
                <h3 class="font-bold">Grade 12 Mathematics – Mock Set ${n}</h3>
                <div class="flex justify-between border-b-2 border-black mt-4 pb-1 text-sm font-bold">
                    <span>Time: 3 hrs</span><span>FM: 75</span>
                </div>
            </div>`;

            html += `<div class="group-header">Group A (11 × 1)</div>`;
            data.groupA.forEach((q, i) => html += `<div class="question-row"><div class="q-no">${i+1}.</div><div class="q-text">${q.q}</div><div class="q-marks">[1]</div></div>`);
            
            html += `<div class="group-header">Group B (8 × 5)</div>`;
            data.groupB.forEach((q, i) => html += `<div class="question-row"><div class="q-no">${i+12}.</div><div class="q-text">${q.q}</div><div class="q-marks">[5]</div></div>`);

            html += `<div class="group-header">Group C (3 × 8)</div>`;
            data.groupC.forEach((q, i) => html += `<div class="question-row"><div class="q-no">${i+20}.</div><div class="q-text">${q.q}</div><div class="q-marks">[8]</div></div>`);

            document.getElementById('content-area').innerHTML = html;
        }

        window.onload = () => {
            const container = document.getElementById('set-links');
            for (let i = 1; i <= 10; i++) {
                const btn = document.createElement('button');
                btn.id = `nav-set${i}`;
                btn.className = 'sidebar-link set-link w-full text-left px-6 py-2';
                btn.innerHTML = `Set ${i}`;
                btn.onclick = () => renderView(`set${i}`);
                container.appendChild(btn);
            }
            generateSets();
            renderView('analysis');
        };
    </script>
</body>
</html>
